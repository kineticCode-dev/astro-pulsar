name: Release & Publish

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  validate:
    name: Validate & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      version-number: ${{ steps.get-version.outputs.version-number }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Get version
        id: get-version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION_NUMBER="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version-number=$VERSION_NUMBER" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npx astro check

      - name: Build project
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERSION: ${{ needs.validate.outputs.version }}
      VERSION_NUMBER: ${{ needs.validate.outputs.version-number }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract changelog for this version
        run: |
          NOTES=$(awk "/^## \[$VERSION_NUMBER\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          echo "$NOTES" > release-notes.md

      - name: Create distribution archives
        run: |
          cd dist && tar -czf "../astro-pulsar-${VERSION_NUMBER}.tar.gz" . && cd ..
          zip -r "astro-pulsar-${VERSION_NUMBER}.zip" dist/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$VERSION_NUMBER" == *"-"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG \
            "astro-pulsar-${VERSION_NUMBER}.tar.gz" \
            "astro-pulsar-${VERSION_NUMBER}.zip"

  notify:
    name: Notify Release
    needs: [validate, release]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Release Summary
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          VERSION_NUMBER: ${{ needs.validate.outputs.version-number }}
        run: |
          echo "## Release Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**Release URL:** https://github.com/${{ github.repository }}/releases/tag/$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Assets" >> $GITHUB_STEP_SUMMARY
          echo "- \`astro-pulsar-${VERSION_NUMBER}.tar.gz\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`astro-pulsar-${VERSION_NUMBER}.zip\`" >> $GITHUB_STEP_SUMMARY
